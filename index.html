<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC/USDT Cyber Analyzer</title>
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111625;
            --bg-card: #1a1f2e;
            --text-primary: #e0e6ed;
            --text-secondary: #94a3b8;
            --neon-cyan: #00f3ff;
            --neon-purple: #bc13fe;
            --neon-green: #0aff60;
            --neon-red: #ff0055;
            --border-glow: 0 0 10px rgba(0, 243, 255, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', 'Roboto', monospace;
            background: var(--bg-primary);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(188, 19, 254, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 243, 255, 0.1) 0%, transparent 50%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 40px 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: rgba(17, 22, 37, 0.8);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid rgba(0, 243, 255, 0.2);
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.1);
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 243, 255, 0.3);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        h2 {
            text-align: center;
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .time-display {
            text-align: center;
            font-family: 'Courier New', monospace;
            color: var(--neon-cyan);
            font-size: 1.1rem;
            margin-bottom: 30px;
            padding: 15px;
            background: rgba(0, 243, 255, 0.05);
            border-radius: 8px;
            border: 1px solid rgba(0, 243, 255, 0.2);
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        select {
            padding: 12px 15px;
            background: var(--bg-card);
            border: 1px solid rgba(0, 243, 255, 0.3);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Courier New', monospace;
            max-width: 140px;
        }

        select:hover {
            border-color: var(--neon-cyan);
            box-shadow: var(--border-glow);
        }

        select:focus {
            outline: none;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.5);
        }

        button {
            padding: 12px 30px;
            background: linear-gradient(135deg, rgba(0, 243, 255, 0.2), rgba(188, 19, 254, 0.2));
            border: 1px solid var(--neon-cyan);
            border-radius: 8px;
            color: var(--neon-cyan);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover:not(:disabled) {
            background: linear-gradient(135deg, rgba(0, 243, 255, 0.4), rgba(188, 19, 254, 0.4));
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            border-color: var(--text-secondary);
            color: var(--text-secondary);
        }

        .status {
            text-align: center;
            margin: 20px 0;
            font-weight: 600;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
        }

        .status.loading {
            color: var(--neon-cyan);
            background: rgba(0, 243, 255, 0.1);
            border: 1px solid rgba(0, 243, 255, 0.3);
            animation: pulse 2s infinite;
        }

        .status.error {
            color: var(--neon-red);
            background: rgba(255, 0, 85, 0.1);
            border: 1px solid rgba(255, 0, 85, 0.3);
        }

        .status.success {
            color: var(--neon-green);
            background: rgba(10, 255, 96, 0.1);
            border: 1px solid rgba(10, 255, 96, 0.3);
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .stat-card {
            background: var(--bg-card);
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(0, 243, 255, 0.15);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple));
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 243, 255, 0.15);
            border-color: rgba(0, 243, 255, 0.4);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            font-family: 'Courier New', monospace;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .bullish { color: var(--neon-green) !important; text-shadow: 0 0 10px rgba(10, 255, 96, 0.5); }
        .bearish { color: var(--neon-red) !important; text-shadow: 0 0 10px rgba(255, 0, 85, 0.5); }
        .neutral { color: var(--neon-cyan) !important; }

        h3 {
            color: var(--neon-cyan);
            margin: 40px 0 20px;
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(0, 243, 255, 0.3);
            padding-bottom: 10px;
        }

        .table-container {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid rgba(0, 243, 255, 0.15);
            background: var(--bg-card);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            font-family: 'Courier New', monospace;
        }

        th {
            background: rgba(0, 243, 255, 0.1);
            color: var(--neon-cyan);
            padding: 15px 10px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 11px;
            border-bottom: 1px solid rgba(0, 243, 255, 0.3);
            position: sticky;
            top: 0;
        }

        td {
            padding: 12px 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
            color: var(--text-secondary);
        }

        tr:hover td {
            background: rgba(0, 243, 255, 0.05);
            color: var(--text-primary);
        }

        .up { color: var(--neon-green); text-shadow: 0 0 5px rgba(10, 255, 96, 0.5); }
        .down { color: var(--neon-red); text-shadow: 0 0 5px rgba(255, 0, 85, 0.5); }

        #results { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .container { padding: 25px; }
            h1 { font-size: 1.8rem; }
            .controls { flex-direction: column; }
            select, button { width: 100%; max-width: none; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>BTC/USDT CYBER ANALYZER</h1>
    <h2>15-Minute Candle Statistics // 30 Days</h2>
    
    <div class="time-display" id="currentTime">SYSTEM TIME: SYNCING...</div>

    <div class="controls">
        <select id="timeSelect"></select>
        <button id="analyzeBtn" onclick="startAnalysis()">[ INITIALIZE SCAN ]</button>
    </div>

    <div class="status" id="statusMessage"></div>

    <div id="results" style="display:none;">
        <h3>// ANALYSIS RESULTS</h3>
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalCandles">0</div>
                <div class="stat-label">Total Candles</div>
            </div>
            <div class="stat-card">
                <div class="stat-value bullish" id="bullishCount">0</div>
                <div class="stat-label">Bullish (<span id="bullishPercent">0%</span>)</div>
            </div>
            <div class="stat-card">
                <div class="stat-value bearish" id="bearishCount">0</div>
                <div class="stat-label">Bearish (<span id="bearishPercent">0%</span>)</div>
            </div>
            <div class="stat-card">
                <div class="stat-value neutral" id="bullishRatio">0%</div>
                <div class="stat-label">Bullish Ratio</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avgBullishSize">0%</div>
                <div class="stat-label">Avg Bullish Body</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avgBearishSize">0%</div>
                <div class="stat-label">Avg Bearish Body</div>
            </div>
        </div>

        <h3>// RECENT CANDLES [LAST 30]</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Open</th>
                        <th>High</th>
                        <th>Low</th>
                        <th>Close</th>
                        <th>Change</th>
                        <th>Type</th>
                    </tr>
                </thead>
                <tbody id="candleTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Генерация всех 15-минутных интервалов (96 вариантов)
    function generateTimeOptions() {
        const select = document.getElementById('timeSelect');
        for (let h = 0; h < 24; h++) {
            for (let m of [0, 15, 30, 45]) {
                const time = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
                const opt = document.createElement('option');
                opt.value = time;
                opt.textContent = time + ' UTC';
                if (time === '12:00') opt.selected = true;
                select.appendChild(opt);
            }
        }
    }
    generateTimeOptions();

    // Обновление времени
    setInterval(() => {
        const now = new Date();
        const timeString = now.toISOString().split('T')[1].split('.')[0] + " UTC";
        document.getElementById('currentTime').textContent = `SYSTEM TIME: ${timeString}`;
    }, 1000);

    async function startAnalysis() {
        const btn = document.getElementById('analyzeBtn');
        const status = document.getElementById('statusMessage');
        const results = document.getElementById('results');
        const timeSlot = document.getElementById('timeSelect').value;
        
        btn.disabled = true;
        btn.textContent = "[ SCANNING... ]";
        results.style.display = 'none';
        status.textContent = "CONNECTING TO BINANCE API // FETCHING 30 DAYS DATA...";
        status.className = "status loading";

        try {
            const candles = await fetch30DaysData();
            const filteredCandles = filterByTimeSlot(candles, timeSlot);
            
            if (filteredCandles.length === 0) {
                throw new Error("NO DATA FOUND FOR SELECTED TIME SLOT");
            }

            const stats = calculateStatistics(filteredCandles);
            renderResults(stats, filteredCandles);
            
            status.textContent = "SCAN COMPLETE // DATA PROCESSED";
            status.className = "status success";
            results.style.display = 'block';
        } catch (error) {
            status.textContent = "ERROR: " + error.message;
            status.className = "status error";
        } finally {
            btn.disabled = false;
            btn.textContent = "[ INITIALIZE SCAN ]";
        }
    }

    async function fetch30DaysData() {
        const symbol = "BTCUSDT";
        const interval = "15m";
        const endTime = Date.now();
        const startTime = endTime - (30 * 24 * 60 * 60 * 1000);
        let allCandles = [];
        let currentStartTime = startTime;

        while (currentStartTime < endTime) {
            const url = `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&startTime=${currentStartTime}&endTime=${endTime}&limit=1000`;
            const response = await fetch(url);
            if (!response.ok) throw new Error("CONNECTION FAILED // CHECK NETWORK");
            const data = await response.json();
            if (data.length === 0) break;
            allCandles = allCandles.concat(data);
            currentStartTime = data[data.length - 1][0] + 1;
        }
        return allCandles;
    }

    function filterByTimeSlot(candles, timeSlot) {
        const [targetHour, targetMinute] = timeSlot.split(':').map(Number);
        return candles.filter(candle => {
            const date = new Date(candle[0]);
            return date.getUTCHours() === targetHour && date.getUTCMinutes() === targetMinute;
        });
    }

    function calculateStatistics(candles) {
        let bullish = 0, bearish = 0, neutral = 0;
        let totalBullishBody = 0, totalBearishBody = 0;

        candles.forEach(candle => {
            const open = parseFloat(candle[1]), close = parseFloat(candle[4]);
            const high = parseFloat(candle[2]), low = parseFloat(candle[3]);
            const range = high - low;
            const body = Math.abs(close - open);
            const bodyPercent = range > 0 ? (body / range) * 100 : 0;

            if (close > open) { bullish++; totalBullishBody += bodyPercent; }
            else if (close < open) { bearish++; totalBearishBody += bodyPercent; }
            else { neutral++; }
        });

        const total = candles.length;
        return {
            total, bullish, bearish, neutral,
            bullishPercent: (bullish / total) * 100,
            bearishPercent: (bearish / total) * 100,
            bullishRatio: total > 0 ? (bullish / total) * 100 : 0,
            avgBullishSize: bullish > 0 ? totalBullishBody / bullish : 0,
            avgBearishSize: bearish > 0 ? totalBearishBody / bearish : 0,
            candles
        };
    }

    function renderResults(stats, candles) {
        document.getElementById('totalCandles').textContent = stats.total;
        document.getElementById('bullishCount').textContent = stats.bullish;
        document.getElementById('bullishPercent').textContent = stats.bullishPercent.toFixed(1) + '%';
        document.getElementById('bearishCount').textContent = stats.bearish;
        document.getElementById('bearishPercent').textContent = stats.bearishPercent.toFixed(1) + '%';
        document.getElementById('bullishRatio').textContent = stats.bullishRatio.toFixed(1) + '%';
        document.getElementById('avgBullishSize').textContent = stats.avgBullishSize.toFixed(1) + '%';
        document.getElementById('avgBearishSize').textContent = stats.avgBearishSize.toFixed(1) + '%';

        const tbody = document.getElementById('candleTableBody');
        tbody.innerHTML = '';
        const recentCandles = candles.slice(-30).reverse();

        recentCandles.forEach(candle => {
            const open = parseFloat(candle[1]), close = parseFloat(candle[4]);
            const high = parseFloat(candle[2]), low = parseFloat(candle[3]);
            const change = ((close - open) / open) * 100;
            const type = close > open ? 'BULL' : (close < open ? 'BEAR' : 'NEUTRAL');
            const typeClass = close > open ? 'up' : (close < open ? 'down' : '');
            const dateObj = new Date(candle[0]);
            const dateStr = dateObj.toISOString().split('T')[0];
            const timeStr = dateObj.toISOString().split('T')[1].substring(0, 5);

            tbody.innerHTML += `
                <tr>
                    <td>${dateStr}</td>
                    <td>${timeStr}</td>
                    <td>${open.toFixed(2)}</td>
                    <td>${high.toFixed(2)}</td>
                    <td>${low.toFixed(2)}</td>
                    <td>${close.toFixed(2)}</td>
                    <td class="${typeClass}">${change > 0 ? '+' : ''}${change.toFixed(2)}%</td>
                    <td class="${typeClass}">${type}</td>
                </tr>
            `;
        });
    }
</script>

</body>
</html>
